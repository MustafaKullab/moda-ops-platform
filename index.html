<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <link rel="stylesheet" href="assets/css/main.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.js"></script>
    <style>
      :root {
        --bg-color: #edf1f4;
        --bg-orders: #ffffff;
        --card-bg: #f8f9fa;
        --bg-ratio: #edf1f4;
        --bg-arrow: #e2ebfc;
        --bg-table: #fbfbfc;
        --bg-thead: #e9ecf5;
        --bg-td: #f1f1f367;
        --text-color: #212529;
        --border-color: #dee2e6;
        --accent-color: rgb(248, 249, 250);
      }
      .dark-theme {
        --bg-color: #0b0e14;
        --bg-orders: #242933;
        --card-bg: #151921;
        --bg-ratio: #8f949d;
        --bg-arrow: rgb(28 39 61 / 87%);
        --bg-table: #151921;
        --bg-thead: #1c1c1c;
        --bg-td: rgb(79 79 79 / 40%);
        --text-color: #e4e6eb;
        --border-color: #242933;
        --accent-color: #212529;
      }
      html {
        overflow-y: scroll; /* بيخلي مكان السكرول بار محجوز دايماً فما بصير قفزة */
        scroll-behavior: smooth;
      }
      body {
        font-family: "Poppins", sans-serif;
        color: var(--text-color);
      }
      .card,
      .navbar,
      .loginDetails {
        background-color: var(--card-bg) !important;
        border-color: var(--border-color) !important;
        color: var(--text-color) !important;
      }

      section:not([aria-label="Notifications alt+T"]) {
        padding: 80px 0 !important;
        background-color: var(--bg-color) !important;
      }
    </style>
  </body>
</html>
